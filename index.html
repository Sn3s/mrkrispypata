
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mr. K's Admin</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: '#0B0B0B',
              surface: '#121212',
              card: '#161616',
              border: '#262626',
              primary: '#FFD100',
              secondary: '#999999',
              muted: '#666666',
              success: '#10B981',
              error: '#EF4444',
              warning: '#F59E0B'
            },
            fontFamily: {
              sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'],
            },
            borderRadius: {
              'xl': '12px',
              '2xl': '16px',
              '3xl': '24px'
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #0B0B0B;
        color: #FFFFFF;
        font-family: 'Plus Jakarta Sans', sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0B0B0B;
      }
      ::-webkit-scrollbar-thumb {
        background: #262626;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #333333;
      }
      /* Leaflet (branches map) — keep tiles/panes under sticky header (z-[100]); modals use z-[125]+ */
      .branches-map-root {
        position: relative;
        z-index: 0;
      }
      .branches-map-root .leaflet-container {
        height: 100%;
        width: 100%;
        background: #0e0e0e;
        font-family: inherit;
        z-index: 0;
      }
      .branches-map-root .leaflet-control-zoom a {
        background: #1a1a1a;
        color: #fff;
        border-color: #333;
      }
      .branches-map-root .leaflet-control-zoom a:hover {
        background: #2a2a2a;
        color: #ffd100;
      }
      .branches-map-popup .leaflet-popup-content-wrapper {
        border-radius: 14px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      }
      .branches-map-popup .leaflet-popup-content {
        margin: 12px 14px;
        line-height: 1.45;
        font-size: 14px;
      }
      .branches-map-tooltip-wrap.leaflet-tooltip {
        background: transparent;
        border: none;
        box-shadow: none;
        padding: 0;
        max-width: min(280px, 90vw);
      }
      .branches-map-tooltip-wrap .leaflet-tooltip-content {
        margin: 0;
        padding: 0;
      }
      .branches-map-tip {
        background: #161616;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 14px;
        padding: 12px 14px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.55);
        color: #e5e5e5;
        font-size: 13px;
        line-height: 1.45;
      }
      .branches-map-tip-title {
        font-weight: 900;
        color: #fff;
        font-size: 15px;
        margin-bottom: 6px;
        letter-spacing: -0.02em;
      }
      .branches-map-tip-status {
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: #ffd100;
        margin-bottom: 8px;
      }
      .branches-map-tip-line {
        color: rgba(255, 255, 255, 0.55);
        font-size: 12px;
        margin-top: 4px;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
